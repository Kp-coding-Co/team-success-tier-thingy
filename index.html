<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Team Tier Dashboard</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --text: #ffffff;
            --blue-bloods: #ff7f7f;
            --great: #ffbf7f;
            --good: #ffff7f;
            --decent: #bfff7f;
            --meh: #7fff7f;
            --bad: #7fffbf;
            --dogshit: #7ffffb;
            --too-new: #7fbfff;
            --modal-bg: #2c2c2c;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }

        /* Controls Layout */
        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .filter-nav {
            display: flex; justify-content: center; gap: 10px; 
            background: #2c2c2c; padding: 15px; border-radius: 8px;
        }

        .filter-nav button {
            padding: 10px 20px; border: none; border-radius: 5px;
            background-color: #444; color: white; cursor: pointer;
            font-weight: bold; text-transform: uppercase; transition: 0.2s;
        }

        .filter-nav button:hover { background-color: #555; }
        .filter-nav button.active { background-color: #007bff; }

        .slider-container {
            display: flex; flex-direction: column; align-items: center;
            background: #2c2c2c; padding: 15px; border-radius: 8px;
        }

        .slider-container label {
            font-weight: bold; margin-bottom: 10px; color: #aaa; text-transform: uppercase; font-size: 0.9rem;
        }

        .slider-container span {
            color: #007bff; font-size: 1.2rem; margin-left: 5px;
        }

        input[type=range] {
            width: 100%; max-width: 400px; cursor: pointer;
        }

        /* Tier Layout */
        .tier-container { display: flex; flex-direction: column; gap: 2px; background: #000; border: 2px solid #000; }
        .tier-row { display: flex; background: #1a1a1a; min-height: 85px; }

        .tier-label {
            width: 120px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-weight: bold; color: #000; padding: 10px;
            flex-shrink: 0; border-right: 2px solid #000; font-size: 0.9rem;
        }

        .tier-content { display: flex; flex-wrap: wrap; padding: 10px; gap: 8px; flex-grow: 1; align-items: center; }

        .team-logo {
            width: 55px; height: 55px; border-radius: 50%; object-fit: contain;
            padding: 4px; background-color: #ffffff; border: 2px solid #444;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, filter 0.3s, opacity 0.3s;
        }

        .team-logo:hover {
            transform: scale(1.2); box-shadow: 0 0 15px rgba(255,255,255,0.4);
            border-color: #fff; z-index: 10; position: relative;
        }

        /* Visually disabled state for teams that don't meet slider criteria */
        .dimmed {
            filter: grayscale(100%);
            opacity: 0.15;
            pointer-events: none;
            transform: none !important;
            box-shadow: none !important;
            border-color: #444 !important;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center;
        }

        .modal-content {
            background: var(--modal-bg); width: 90%; max-width: 600px; border-radius: 12px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;
            max-height: 85vh; overflow-y: auto;
        }

        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa;
            cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        .modal-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px;}
        .modal-logo { width: 80px; height: 80px; border-radius: 50%; background: #fff; padding: 5px; object-fit: contain; }
        .modal-title { font-size: 1.5rem; margin: 0; }
        .modal-league { color: #aaa; font-size: 0.9rem; text-transform: uppercase; margin-top: 5px; }

        h3 { border-left: 4px solid #007bff; padding-left: 10px; margin-top: 25px;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1a1a1a; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #111; color: #007bff; font-weight: bold; }
        tr:hover { background-color: #222; }
        
        .championship-row { background-color: rgba(255, 215, 0, 0.1); }
        .championship-row td:last-child::after { content: ' 🏆'; }

        /* Tier Colors */
        .bb { background-color: var(--blue-bloods); } .gr { background-color: var(--great); }
        .go { background-color: var(--good); } .de { background-color: var(--decent); }
        .me { background-color: var(--meh); } .ba { background-color: var(--bad); }
        .ds { background-color: var(--dogshit); } .tn { background-color: var(--too-new); font-size: 0.8rem; }
        .hidden { display: none !important; }
    </style>
</head>

        document.querySelectorAll('.tier-row').forEach(row => {
            const visibleLogos = row.querySelectorAll('.team-logo:not(.hidden)');
            row.classList.toggle('hidden', visibleLogos.length === 0);
        });
    }

    // Modal Logic
    const modal = document.getElementById('teamModal');
    
    function openModal(imgElement) {
        const teamName = imgElement.getAttribute('title');
        document.getElementById('modalImg').src = imgElement.src;
        document.getElementById('modalTitle').innerText = teamName;
        document.getElementById('modalLeague').innerText = imgElement.getAttribute('data-league') + ' Franchise';
        
        let data = teamDatabase[teamName];

        // Fallback generators for missing data
        if (!data) {
            data = generateMockData();
        } else if (!data.seasons || Object.keys(data.seasons).length === 0) {
            data.seasons = generateMockData().seasons;
        }

        // Populate Titles
        document.getElementById('titlesBody').innerHTML = `
            <tr>
                <td><strong>${data.titles}</strong></td>
                <td>${data.titleYears || "None"}</td>
            </tr>
        `;

        // Populate Seasons
        let seasonHTML = '';
        for (let year = 2025; year >= 2000; year--) {
            const isChamp = data.championshipSeasons.includes(year);
            const rowClass = isChamp ? 'class="championship-row"' : '';
            const pct = data.seasons[year] || ".500";
            
            seasonHTML += `
                <tr ${rowClass}>
                    <td>${year}</td>
                    <td>${pct}</td>
                </tr>
            `;
        }
        document.getElementById('winPctBody').innerHTML = seasonHTML;
        modal.style.display = 'flex';
    }

    function closeModal(e, force = false) {
        if (force || e.target === modal) {
            modal.style.display = 'none';
        }
    }

    // Auto-generates placeholder win percentages
    function generateMockData() {
        let seasons = {};
        for(let i=2000; i<=2025; i++) {
            seasons[i] = "." + Math.floor(Math.random() * (750 - 350 + 1) + 350);
        }
        return {
            titles: 0,
            titleYears: "Data Pending...",
            championshipSeasons: [],
            seasons: seasons
        };
    }
</script>

</body>
</html>
