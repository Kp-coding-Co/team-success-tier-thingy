    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Team Tier Dashboard</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --text: #ffffff;
            --blue-bloods: #ff7f7f;
            --great: #ffbf7f;
            --good: #ffff7f;
            --decent: #bfff7f;
            --meh: #7fff7f;
            --bad: #7fffbf;
            --dogshit: #7ffffb;
            --too-new: #7fbfff;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            background: #2c2c2c;
            padding: 15px;
            border-radius: 8px;
        }

        .filter-nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #444;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }

        .filter-nav button:hover {
            background-color: #555;
        }

        .filter-nav button.active {
            background-color: #007bff;
        }

        .tier-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: #000;
            border: 2px solid #000;
        }

        .tier-row {
            display: flex;
            background: #1a1a1a;
            min-height: 85px;
        }

        .tier-label {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            color: #000;
            padding: 10px;
            flex-shrink: 0;
            border-right: 2px solid #000;
            font-size: 0.9rem;
        }

        .tier-content {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            gap: 8px;
            flex-grow: 1;
            align-items: center;
        }

        /* Adjusted Circular Logo Style for Real Logos */
        .team-logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: contain; /* Ensures the whole logo is visible */
            padding: 4px; /* Gives breathing room inside the circle */
            background-color: #ffffff; /* White background for contrast */
            border: 2px solid #444;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .team-logo:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            border-color: #fff;
            z-index: 10;
            position: relative;
        }

        /* Tier Colors */
        .bb { background-color: var(--blue-bloods); }
        .gr { background-color: var(--great); }
        .go { background-color: var(--good); }
        .de { background-color: var(--decent); }
        .me { background-color: var(--meh); }
        .ba { background-color: var(--bad); }
        .ds { background-color: var(--dogshit); }
        .tn { background-color: var(--too-new); font-size: 0.8rem; }

        .hidden { display: none !important; }
    </style>
</head>

            <img src="https://a.espncdn.com/i/teamlogos/nhl/500/sea.png" class="team-logo" data-league="nhl" title="Seattle Kraken">
            <img src="https://a.espncdn.com/i/teamlogos/nhl/500/wpg.png" class="team-logo" data-league="nhl" title="Winnipeg Jets">
        </div>
    </div>
</div>

<script>
    function filter(league, btn) {
        // Update active button state
        document.querySelectorAll('.filter-nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filter circular logos based on the data-league attribute
        const logos = document.querySelectorAll('.team-logo');
        logos.forEach(logo => {
            if (league === 'all' || logo.getAttribute('data-league') === league) {
                logo.classList.remove('hidden');
            } else {
                logo.classList.add('hidden');
            }
        });

        // Hide tier rows that have no visible logos after filtering
        document.querySelectorAll('.tier-row').forEach(row => {
            const visibleLogos = row.querySelectorAll('.team-logo:not(.hidden)');
            if (visibleLogos.length === 0) {
                row.classList.add('hidden');
            } else {
                row.classList.remove('hidden');
            }
        });
    }
</script>

</body>
</html>
